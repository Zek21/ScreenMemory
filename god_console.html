<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SKYNET Dashboard Redirect</title>
<meta http-equiv="refresh" content="0; url=/dashboard">
<style>
body {
  margin: 0;
  min-height: 100vh;
  display: grid;
  place-items: center;
  background: #0a0a0f;
  color: #e2e8f0;
  font: 14px/1.5 "JetBrains Mono", monospace;
}
.card {
  width: min(520px, calc(100vw - 32px));
  padding: 24px;
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 12px;
  background: rgba(12,14,22,0.92);
}
a { color: #00f0ff; }
</style>
<script>
if (location.protocol === "http:" || location.protocol === "https:") {
  location.replace("/dashboard");
}
</script>
</head>
<body>
  <div class="card">
    <div>Legacy GOD Console surface retired.</div>
    <div>Canonical dashboard: <a href="/dashboard">/dashboard</a></div>
    <div>If opened outside the local server, launch <code>http://localhost:8421/dashboard</code>.</div>
  </div>
</body>
</html>
